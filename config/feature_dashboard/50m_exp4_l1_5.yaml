job: feature_dashboard

model_name: /vol/models/Qwen3-4B-Base
activation_path: /vol/activations/qwen3-4b-base/layer20/50m
sae_path: /vol/saes/qwen3-4b-base/layer20/50m_standard_exp4_l1_5
load_path: /vol/saes/qwen3-4b-base/layer20/50m_standard_exp4_l1_5/final_sae
hook_name: model.layers.20

output_path: /vol/features/qwen3-4b-base/layer20/50m_standard_exp4_l1_5/dashboard
overwrite: true

# Full dashboard pass: scan all cached activation rows and write top examples
# for every SAE feature. Raise batch_rows if the GPU has lots of free memory.
top_k: 20
window_tokens: 48
preview_features: 40
batch_rows: 8

# Evidence-quality filters for autointerp readiness.
min_token_position: 8
min_example_activation: 1e-6
max_activation_examples_per_feature: 20

# Preview-quality gate: preview.md shows loudest features, while
# diverse_preview.md samples farther down the max-activation ranking.
diverse_preview_top: 20
diverse_preview_middle: 20
diverse_preview_tail: 20
diverse_preview_seed: 42

device: cuda
dtype: float32
local_files_only: true
trust_remote_code: true
