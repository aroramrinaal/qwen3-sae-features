job: feature_dashboard

model_name: /vol/models/Qwen3-4B-Base
activation_path: /vol/activations/qwen3-4b-base/layer20/50m
sae_path: /vol/saes/qwen3-4b-base/layer20/50m_standard_exp4_l1_5
load_path: /vol/saes/qwen3-4b-base/layer20/50m_standard_exp4_l1_5/final_sae
hook_name: model.layers.20

output_path: /vol/features/qwen3-4b-base/layer20/50m_standard_exp4_l1_5/smoke_dashboard
overwrite: true

# Smoke run: scan a tiny slice, then write only the strongest features found in
# that slice. This proves encoding, top-k selection, token lookup, and decoding.
max_rows: 8
num_features: 32
top_k: 5
window_tokens: 24
preview_features: 12
batch_rows: 2

# Evidence-quality filters. Smoke is still too small for real interpretation,
# but these catch row-start and zero-activation artifacts early.
min_token_position: 8
min_example_activation: 1e-6
max_activation_examples_per_feature: 20

device: cuda
dtype: float32
local_files_only: true
trust_remote_code: true
