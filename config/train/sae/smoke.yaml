model_name: /vol/models/Qwen3-4B-Base
model_class_name: AutoModelForCausalLM
hook_name: model.layers.20
hook_layer: 20
d_in: 2560
context_size: 512

dataset_path: /vol/datasets/fineweb-edu/tokens/smoke
is_dataset_tokenized: true
use_cached_activations: true
cached_activations_path: /vol/activations/qwen3-4b-base/layer20/smoke

architecture: standard
expansion_factor: 2
d_sae: 5120
normalize_activations: none
apply_b_dec_to_input: true

training_tokens: 8192
train_batch_size_tokens: 1024
store_batch_size_prompts: 2
n_batches_in_buffer: 2
activations_mixing_fraction: 0.0

lr: 0.0003
l1_coefficient: 5.0
l1_warm_up_steps: 0
lr_warm_up_steps: 0
lr_decay_steps: 0
lr_scheduler_name: constant

dtype: float32
device: cuda
act_store_device: cpu
seed: 42
prepend_bos: false
streaming: false
n_eval_batches: 0

log_to_wandb: false
wandb_log_frequency: 1
eval_every_n_wandb_logs: 1

n_checkpoints: 0
checkpoint_path: /vol/saes/qwen3-4b-base/layer20/smoke_standard_exp2/checkpoints
output_path: /vol/saes/qwen3-4b-base/layer20/smoke_standard_exp2/output
sae_output_path: /vol/saes/qwen3-4b-base/layer20/smoke_standard_exp2
save_final_checkpoint: true

model_from_pretrained_kwargs:
  torch_dtype: bfloat16
  device_map: auto
  local_files_only: true
